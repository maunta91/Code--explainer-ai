<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Code Explainer AI</title>

    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="container">

        <h1>Code Explainer AI</h1>

        <!-- Input Section -->
        <div class="input-section">

            <textarea
                id="codeInput"
                placeholder="Paste your code here..."
            ></textarea>

            <button id="analyzeBtn">
                Analyze Code
            </button>

        </div>

        <!-- Loading -->
        <div id="loading" class="loading hidden">

            <div class="spinner"></div>

            <p>Analyzing your code...</p>

        </div>

        <!-- Error Box -->
        <div id="errorBox" class="error-box hidden">
            Please paste some code before analyzing.
        </div>

        <!-- Output Panels -->
        <div class="panels">

            <!-- Explanation -->
            <div class="panel">
                <h2>Explanation</h2>

                <div id="explanationOutput">
                    AI explanation will appear here.
                </div>
            </div>

            <!-- Issues -->
            <div class="panel">
                <h2>Issues Found</h2>

                <ul id="issuesOutput">
                    <li>No issues detected yet.</li>
                </ul>
            </div>

            <!-- Suggestions -->
            <div class="panel">
                <h2>Suggested Fix</h2>

                <pre id="suggestionOutput">
Your improved code will appear here.
                </pre>
            </div>

        </div>

    </div>

    <script src="api.js"></script>

</body>
</html>
